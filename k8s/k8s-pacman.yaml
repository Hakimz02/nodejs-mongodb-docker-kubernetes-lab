apiVersion: apps/v1
kind: Deployment
metadata:
  name: pacman-mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pacman-mongo
  template:
    metadata:
      labels:
        app: pacman-mongo
    spec:
      containers:
        - name: mongo
          image: mongo:3.4
          ports:
            - containerPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: pacman-mongo
spec:
  selector:
    app: pacman-mongo
  ports:
    - port: 27017
      targetPort: 27017

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pacman-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pacman-app
  template:
    metadata:
      labels:
        app: pacman-app
    spec:
      containers:
        - name: pacman-app
          image: pacman-nodejs-app:k8s
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: MONGO_SERVICE_HOST
              value: "pacman-mongo"
            - name: MY_MONGO_PORT
              value: "27017"
            - name: MONGO_DATABASE
              value: "pacman"

---
apiVersion: v1
kind: Service
metadata:
  name: pacman-app
spec:
  type: NodePort
  selector:
    app: pacman-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
